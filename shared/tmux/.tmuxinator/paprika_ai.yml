name: paprika_ai
root: <%= ENV["PROJECT_DIR"] %>/paprika_ai
# focus the claude pane on startup (pane-base-index 1; claude is pane 2)
startup_pane: 2

windows:
  - editor:
      # left column: short `rails s` pane (top) above claude (bottom); nvim fills the right.
      # pane order below maps to the layout cells top-left, bottom-left, then right.
      layout: db78,272x62,0,0{80x62,0,0[80x10,0,0,2,80x51,0,11,0],191x62,81,0,1}
      panes:
        - rails s
        - claude
        - nvim .
