name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          # Fail only on genuine bugs for now. There are pre-existing
          # warnings (e.g. `set -o pipefail` under #!/bin/sh) worth a
          # separate cleanup pass; tighten to `warning` once addressed.
          severity: error
          # Skip vendored/generated trees that aren't ours to lint.
          ignore_paths: shared/vim UltiSnips node_modules shared/.claude

  tmuxinator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - name: Validate tmuxinator configs parse as YAML
        run: |
          for f in shared/tmux/.tmuxinator/*.yml; do
            echo "checking $f"
            ruby -ryaml -e "YAML.load_file('$f')" || exit 1
          done
