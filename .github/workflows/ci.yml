name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          # Fail only on genuine bugs for now. There are pre-existing
          # warnings (e.g. `set -o pipefail` under #!/bin/sh) worth a
          # separate cleanup pass; tighten to `warning` once addressed.
          severity: error
          # Skip vendored/generated trees that aren't ours to lint.
          ignore_paths: shared/vim UltiSnips node_modules shared/.claude

  tmuxinator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - name: Install tmux and tmuxinator
        run: |
          sudo apt-get update && sudo apt-get install -y tmux
          gem install tmuxinator
      - name: Validate tmuxinator configs render
        # `debug` evaluates the ERB and builds the project without starting a
        # tmux server, so it catches ERB errors, malformed YAML, missing
        # windows, and other structural problems — stricter than a YAML parse.
        env:
          PROJECT_DIR: /tmp/project
        run: |
          fail=0
          for f in shared/tmux/.tmuxinator/*.yml; do
            echo "checking $f"
            if ! tmuxinator debug -p "$f" dummy >/dev/null; then
              echo "::error file=$f::tmuxinator failed to render $f"
              fail=1
            fi
          done
          exit $fail
